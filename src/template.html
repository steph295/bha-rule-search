<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>BHA Rules Search</title>
<meta name="description" content="Fast search for the British Horseracing Authority Rules of Racing — by rule code, keyword or fuzzy match.">
<meta name="theme-color" content="#0a3d2c">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BHA Rules">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%230a3d2c'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'%3E§%3C/text%3E%3C/svg%3E">
<style>
{{STYLES}}
</style>
</head>
<body>

<header>
  <h1>BHA <span class="thin">Rules Search</span></h1>
  <button id="status" type="button"><span class="dot"></span><span class="stxt">Loading…</span></button>
</header>

<div class="searchwrap">
  <div class="searchbox">
    <input id="q" type="search" autocomplete="off" autocorrect="off" autocapitalize="off"
           spellcheck="false" enterkeyhint="search" autofocus
           placeholder="Rule code or keyword — F45, whip, non-runner…"
           aria-label="Search the Rules of Racing">
    <button id="clear" type="button" aria-label="Clear search">✕</button>
  </div>
</div>

<main>
  <div id="meta" role="status"></div>
  <div id="results"></div>
</main>

<dialog id="panel">
  <div class="panel-inner">
    <h2>Rules data</h2>
    <p id="paneldesc"></p>
    <p>The app refreshes itself from <b>rules.britishhorseracing.com</b> when it can.
       If that site is unreachable, you can paste rules text (or the book JSON) here instead:</p>
    <textarea id="pastebox" placeholder="Paste rules text or book JSON…"></textarea>
    <div class="panel-btns">
      <button id="checknow" class="btn">Check for updates now</button>
      <button id="pastego" class="btn ghost">Load pasted text</button>
      <button id="panelclose" class="btn ghost">Close</button>
    </div>
    <div id="panelmsg"></div>
  </div>
</dialog>

<div id="toast" role="status"></div>

<script id="bha-snapshot" type="application/json">{{SNAPSHOT}}</script>
<script>
{{PARSER}}
</script>
<script>
{{APP}}
</script>
</body>
</html>
